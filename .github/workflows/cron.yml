name: Daily Job Hunt

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC = 8 AM SAST daily
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pipeline
        run: |
          curl -X POST "${{ secrets.RENDER_APP_URL }}/cron/run/" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            --fail \
            --silent \
            --show-error
