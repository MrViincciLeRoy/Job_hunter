name: Test LinkedIn Scraper

on:
  workflow_dispatch:
    inputs:
      keywords:
        description: "Search keywords"
        required: false
        default: "python developer south africa"
      limit:
        description: "Max jobs to return"
        required: false
        default: "10"

jobs:
  test-linkedin:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: job_hunter_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "1"
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/job_hunter_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Test LinkedIn scraper
        run: |
          python manage.py test_linkedin \
            --keywords "${{ github.event.inputs.keywords }}" \
            --limit ${{ github.event.inputs.limit }}