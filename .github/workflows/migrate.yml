name: Make & Commit Migrations

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: "True"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HF_API_KEY: ${{ secrets.HF_API_KEY }}
      HF_MODEL: ${{ secrets.HF_MODEL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Delete all existing migrations
        run: |
          find apps -path "*/migrations/*.py" -not -name "__init__.py" -delete
          find apps -path "*/migrations/*.pyc" -delete

      - name: Make fresh migrations
        run: |
          python manage.py makemigrations accounts --no-input
          python manage.py makemigrations cv --no-input
          python manage.py makemigrations scraper --no-input
          python manage.py makemigrations mailer --no-input
          python manage.py makemigrations matcher --no-input

      - name: Run migrate
        run: python manage.py migrate --no-input

      - name: Commit migration files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apps/*/migrations/*.py
          git diff --cached --quiet || git commit -m "chore: regenerate migrations"
          git push