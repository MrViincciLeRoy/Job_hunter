name: Make & Commit Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: github-actions-dummy-key
      DEBUG: "True"
      DATABASE_URL: sqlite:///db.sqlite3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install Django>=4.2 python-jobspy pdfplumber groq requests \
            beautifulsoup4 python-dotenv dj-database-url google-auth \
            google-auth-oauthlib google-api-python-client aiohttp

      - name: Make migrations
        run: python manage.py makemigrations --no-input

      - name: Merge migrations if needed
        run: python manage.py makemigrations --merge --no-input

      - name: Run migrate
        run: python manage.py migrate --no-input

      - name: Commit migration files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apps/*/migrations/*.py
          git diff --cached --quiet || git commit -m "chore: add migrations"
          git push