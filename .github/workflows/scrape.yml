name: Job Scraper Pipeline

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Pipeline step"
        required: false
        default: "all"
        type: choice
        options: [all, scrape, spider, match]
      job_types:
        description: "Job types (space-separated): internship learnership bursary scholarship graduate entry_level low_barrier permanent all"
        required: false
        default: "all"
        type: string
      keywords:
        description: "Search keywords (blank = use CV skills)"
        required: false
        default: ""
        type: string
      max_jobs:
        description: "Max jobs per scraper (0 = unlimited)"
        required: false
        default: "0"
        type: string
      workers:
        description: "Parallel worker threads"
        required: false
        default: "4"
        type: string
      scrapers:
        description: "Limit to specific scrapers (space-separated): pnet careerjunction careers24 jobmail gumtree dpsa sayouth essa govza"
        required: false
        default: ""
        type: string
      gov_only:
        description: "Government sources only?"
        required: false
        default: "no"
        type: choice
        options: [no, yes]
      it_only:
        description: "IT platforms only?"
        required: false
        default: "no"
        type: choice
        options: [no, yes]
      email_only:
        description: "Email-yielding platforms only?"
        required: false
        default: "no"
        type: choice
        options: [no, yes]
      no_skip:
        description: "Re-scrape already-seen URLs?"
        required: false
        default: "no"
        type: choice
        options: [no, yes]
      spider_limit:
        description: "Spider: max URLs to process"
        required: false
        default: "100"
        type: string
      spider_concurrent:
        description: "Spider: concurrent async requests"
        required: false
        default: "15"
        type: string
      match_limit:
        description: "Match: max jobs to score per run"
        required: false
        default: "25"
        type: string

  schedule:
    - cron: "0 6 * * 1"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: job_hunter.settings
      DATABASE_URL:    ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
      HF_API_KEY:      ${{ secrets.HF_API_KEY }}
      EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
      EMAIL_HOST_PASS: ${{ secrets.EMAIL_HOST_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Set job_types env
        run: |
          JOB_TYPES="${{ github.event.inputs.job_types }}"
          if [ -z "$JOB_TYPES" ]; then JOB_TYPES="all"; fi
          echo "JOB_TYPES=$JOB_TYPES" >> $GITHUB_ENV

      - name: Scrape jobs
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'scrape' || github.event.inputs.step == '' }}
        run: |
          CMD="python manage.py scrape_jobs"
          CMD="$CMD --workers ${{ github.event.inputs.workers || '4' }}"

          JOB_TYPES="${{ github.event.inputs.job_types || 'all' }}"
          if [ "$JOB_TYPES" != "all" ] && [ -n "$JOB_TYPES" ]; then
            CMD="$CMD --types $JOB_TYPES"
          fi

          KW="${{ github.event.inputs.keywords }}"
          if [ -n "$KW" ]; then CMD="$CMD --keywords \"$KW\""; fi

          MAX_JOBS="${{ github.event.inputs.max_jobs || '0' }}"
          if [ "$MAX_JOBS" != "0" ]; then CMD="$CMD --max-jobs $MAX_JOBS"; fi

          SCRAPERS="${{ github.event.inputs.scrapers }}"
          if [ -n "$SCRAPERS" ]; then CMD="$CMD --scrapers $SCRAPERS"; fi

          if [ "${{ github.event.inputs.gov_only }}" = "yes" ];   then CMD="$CMD --gov-only"; fi
          if [ "${{ github.event.inputs.it_only }}" = "yes" ];    then CMD="$CMD --it-only"; fi
          if [ "${{ github.event.inputs.email_only }}" = "yes" ]; then CMD="$CMD --email-only"; fi
          if [ "${{ github.event.inputs.no_skip }}" = "yes" ];    then CMD="$CMD --no-skip"; fi

          echo "Running: $CMD"
          eval $CMD

      - name: Spider for emails
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'spider' || github.event.inputs.step == '' }}
        run: |
          python manage.py spider_jobs \
            --limit ${{ github.event.inputs.spider_limit || '100' }} \
            --concurrent ${{ github.event.inputs.spider_concurrent || '15' }}

      - name: Match CV to jobs
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'match' || github.event.inputs.step == '' }}
        run: |
          pip install -r requirements-heavy.txt
          python manage.py match_jobs \
            --limit ${{ github.event.inputs.match_limit || '25' }}