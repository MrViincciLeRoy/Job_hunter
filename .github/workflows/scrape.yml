name: Job Scraper Pipeline

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Pipeline step to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - scrape
          - spider
          - match
      job_types:
        description: "Job types to include (space-separated). Options: internship learnership bursary scholarship graduate entry_level low_barrier permanent all"
        required: false
        default: "all"
        type: string
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: job_hunter.settings
      DATABASE_URL:    ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
      HF_API_KEY:      ${{ secrets.HF_API_KEY }}
      EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
      EMAIL_HOST_PASS: ${{ secrets.EMAIL_HOST_PASS }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      # ── Resolve job_types arg ──────────────────────────────────────────────
      # When triggered by schedule, default to 'all'.
      # When triggered manually, use whatever was passed in.
      - name: Set job_types env
        run: |
          JOB_TYPES="${{ github.event.inputs.job_types }}"
          if [ -z "$JOB_TYPES" ]; then
            JOB_TYPES="all"
          fi
          echo "JOB_TYPES=$JOB_TYPES" >> $GITHUB_ENV

      # ── Scrape ────────────────────────────────────────────────────────────
      - name: Scrape jobs
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'scrape' || github.event.inputs.step == '' }}
        run: |
          if [ "$JOB_TYPES" = "all" ]; then
            python manage.py scrape_jobs --workers 4
          else
            python manage.py scrape_jobs --workers 4 --types $JOB_TYPES
          fi

      # ── Spider ────────────────────────────────────────────────────────────
      - name: Spider for emails
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'spider' || github.event.inputs.step == '' }}
        run: python manage.py spider_jobs --limit 100 --concurrent 15

      # ── Match ─────────────────────────────────────────────────────────────
      - name: Match CV to jobs
        if: ${{ github.event.inputs.step == 'all' || github.event.inputs.step == 'match' || github.event.inputs.step == '' }}
        run: pip install -r requirements-heavy.txt && python manage.py match_jobs
