name: Cleanup Unapplied Jobs

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Limit to one platform slug (leave blank for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run? (yes = preview only, no = actually delete)"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cleanup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEBUG: "False"
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          CMD="python manage.py cleanup_jobs"

          if [ "$DRY_RUN" = "no" ]; then
            CMD="$CMD --confirm"
          fi

          if [ -n "$PLATFORM" ]; then
            CMD="$CMD --platform $PLATFORM"
          fi

          echo "Running: $CMD"
          $CMD
