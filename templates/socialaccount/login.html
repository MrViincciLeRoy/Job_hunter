{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Job Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --accent: #00ff88; --accent2: #7c6aff; --text: #e8e8f0; --muted: #555570;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    padding: 3rem 2.5rem; width: 100%; max-width: 400px;
    position: relative; text-align: center;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .logo {
    font-family: 'Space Mono', monospace; font-size: 0.85rem;
    color: var(--muted); margin-bottom: 2.5rem;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  h1 { font-size: 1.3rem; font-weight: 500; margin-bottom: 0.5rem; }
  p { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
  .continue-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    width: 100%; padding: 0.9rem 1.5rem;
    background: #fff; color: #1a1a1a;
    border: none; cursor: pointer; text-decoration: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }
  .continue-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
  .back {
    display: block; margin-top: 1.25rem;
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    color: var(--muted); text-decoration: none; transition: color 0.15s;
  }
  .back:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div>job/hunter</div>
  <div class="icon">🔐</div>
  <h1>Redirecting to Google</h1>
  <p>You're about to sign in securely via your Google account.</p>

  <form method="post" action="{% url 'google_login' %}">
    {% csrf_token %}
    <button type="submit" class="continue-btn">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </form>

  <a href="/accounts/login/" class="back">← Back to login</a>
</div>
</body>
</html>
