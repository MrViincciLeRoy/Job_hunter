<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload CV — Job Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent: #00ff88; --text: #e8e8f0; --muted: #555570; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 2.5rem; width: 100%; max-width: 440px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
  h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 0.5rem; }
  p { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
  .drop-zone {
    border: 2px dashed var(--border); padding: 2.5rem; text-align: center;
    cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 1.5rem;
  }
  .drop-zone:hover { border-color: var(--accent); background: rgba(0,255,136,0.02); }
  .drop-zone input { display: none; }
  .drop-label { font-size: 0.85rem; color: var(--muted); }
  .drop-label strong { display: block; color: var(--accent); font-family: 'Space Mono', monospace; font-size: 0.75rem; margin-bottom: 0.5rem; }
  .file-name { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--accent); margin-top: 0.75rem; }
  .submit-btn {
    width: 100%; background: var(--accent); color: #000; border: none;
    padding: 0.9rem; font-family: 'Space Mono', monospace; font-size: 0.8rem;
    font-weight: 700; cursor: pointer; transition: opacity 0.15s;
  }
  .submit-btn:hover { opacity: 0.85; }
  .back { display: block; text-align: center; margin-top: 1rem; color: var(--muted); font-size: 0.8rem; text-decoration: none; }
  .back:hover { color: var(--text); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">job/hunter</div>
  <h1>Upload your CV</h1>
  <p>PDF only. Groq AI will extract your skills and experience automatically.</p>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="drop-zone" onclick="document.getElementById('cv-input').click()">
      <input type="file" id="cv-input" name="cv" accept=".pdf" onchange="showName(this)">
      <div class="drop-label">
        <strong>CLICK TO SELECT FILE</strong>
        PDF format · Max 10MB
      </div>
      <div class="file-name" id="file-name"></div>
    </div>
    <button type="submit" class="submit-btn">UPLOAD &amp; PARSE CV →</button>
  </form>

  <a href="/" class="back">← Back to dashboard</a>
</div>

<script>
  function showName(input) {
    const el = document.getElementById('file-name');
    el.textContent = input.files[0] ? input.files[0].name : '';
  }
</script>
</body>
</html>
